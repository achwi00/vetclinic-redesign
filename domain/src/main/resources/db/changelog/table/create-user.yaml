databaseChangeLog:
  - changeSet:
      id: create-user
      author: achwi00
      changes:
        - createTable:
            tableName: USER
            columns:
              - column:
                  name: ID
                  type: BIGINT AUTO_INCREMENT
                  constraints:
                    primaryKey: true
              - column:
                  name: EMAIL
                  type: VARCHAR(40)
                  constraints:
                    nullable: true
                    unique: false
              - column:
                  name: PASSWORD_HASH
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: false
              - column:
                  name: ROLE
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true